<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shift Worker - Brutalist Elegance</title>
    <style>
        @charset "UTF-8";
        /* Brutalist Elegance - Hzmelisa66 inspired */
        :root {
            --bg: #000b1a;
            --text: #e0f2ff;
            --accent: #007acc;
            --border: 4px solid #007acc;
            --shadow: 8px 8px 0px #002d4d;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #001529;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 3rem;
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brutalist Elegance</h1>
        <p>Raw aesthetics. Professional logic. Machine elegance.</p>
    </div>
</body>
</html>
